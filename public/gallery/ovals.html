<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaycrazE | Ovals</title>

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png" />
  <link rel="stylesheet" href="/css/styles.css" />

  <style>
    .ovals-page {
      min-height: 100vh;
    }

    .ovals-shell {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .ovals-hero {
      background: rgba(244, 233, 194, 0.72);
      border: 1px solid rgba(90, 65, 32, 0.14);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(49, 29, 13, 0.08);
      padding: 1.8rem 1.5rem;
      margin-bottom: 1.75rem;
    }

    .ovals-kicker {
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #775126;
      margin: 0 0 0.4rem;
    }

    .ovals-title {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.02;
      margin: 0 0 0.65rem;
      color: #2f1d12;
    }

    .ovals-copy {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #4b3422;
      max-width: 48rem;
      margin: 0;
    }

    .ovals-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.25rem;
    }

    .ovals-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.15rem;
      border-radius: 999px;
      background: rgba(87, 57, 28, 0.9);
      color: #f7eed7;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .ovals-link.secondary {
      background: rgba(255, 250, 240, 0.7);
      color: #5d3b1c;
      border: 1px solid rgba(90, 65, 32, 0.14);
    }

    .ovals-link:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .ovals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .piece-card {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      padding: 1rem;
      border-radius: 22px;
      background: rgba(246, 237, 206, 0.86);
      border: 1px solid rgba(90, 65, 32, 0.12);
      box-shadow: 0 14px 32px rgba(49, 29, 13, 0.08);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .piece-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(49, 29, 13, 0.12);
    }

    .piece-thumb-shell {
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: rgba(225, 210, 170, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0.7rem;
    }

    .piece-thumb {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .piece-fallback {
      text-align: center;
      line-height: 1.5;
      color: #6c4a27;
      font-size: 0.96rem;
      padding: 1rem;
    }

    .piece-name {
      margin: 0;
      font-size: 1.08rem;
      color: #2f1d12;
    }

    .piece-id {
      margin: 0;
      font-size: 0.94rem;
      color: #6a4a2a;
      letter-spacing: 0.03em;
    }

    .empty-state {
      padding: 1.25rem;
      border-radius: 18px;
      background: rgba(246, 237, 206, 0.86);
      border: 1px solid rgba(90, 65, 32, 0.12);
      color: #4a3221;
    }

    @media (max-width: 700px) {
      .ovals-shell {
        width: min(100% - 1rem, 1180px);
        padding-top: 1rem;
      }

      .ovals-hero {
        padding: 1.3rem 1rem;
      }
    }
  </style>
</head>

<body class="practice-page ovals-page">
  <header class="site-header">
    <div class="header-shell">
      <a class="site-brand" href="/">
        <span class="site-title">ClaycrazE</span>
        <span class="site-tag">The Pottery and Studio Wisdom of Jim Alexander</span>
      </a>

      <button
        class="nav-toggle"
        id="navToggle"
        type="button"
        aria-expanded="false"
        aria-controls="siteNav"
        aria-label="Toggle navigation"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" id="siteNav">
        <a href="/">Home</a>
        <a href="/theory.html">Theory</a>
        <a href="/practice.html" class="active">Practice</a>
      </nav>
    </div>
  </header>

  <main class="ovals-shell">
    <section class="ovals-hero">
      <p class="ovals-kicker">Practice / Bonsai</p>
      <h1 class="ovals-title">Oval Bonsai Containers</h1>
      <p class="ovals-copy">
        Oval forms hold movement quietly. They are broad enough to feel settled,
        but never so fixed that they lose the suggestion of drift.
      </p>

      <div class="ovals-actions">
        <a class="ovals-link" href="/practice.html">Back to Practice</a>
        <a class="ovals-link secondary" href="/gallery/bonsai.html">Back to Bonsai</a>
      </div>
    </section>

    <section class="ovals-grid" id="ovalsGrid" aria-label="Oval bonsai pieces"></section>
  </main>

  <script>
    console.log("[ovals] script loaded");

    const navToggle = document.getElementById("navToggle");
    const siteNav = document.getElementById("siteNav");

    console.log("[ovals] navToggle:", navToggle);
    console.log("[ovals] siteNav:", siteNav);

    if (navToggle && siteNav) {
      navToggle.addEventListener("click", () => {
        const expanded = navToggle.getAttribute("aria-expanded") === "true";
        navToggle.setAttribute("aria-expanded", String(!expanded));
        siteNav.classList.toggle("open");
        console.log("[ovals] nav toggled, expanded:", !expanded);
      });
    }

    const ovalPieces = [
      { id: "ov-2604-01", title: "Oval bonsai container" },
      { id: "ov-2604-02", title: "Oval bonsai container" },
      { id: "ov-2604-03", title: "Oval bonsai container" },
      { id: "ov-2604-04", title: "Oval bonsai container" }
    ];

    console.log("[ovals] ovalPieces:", ovalPieces);

    const grid = document.getElementById("ovalsGrid");
    console.log("[ovals] grid element:", grid);

    function thumbUrl(id) {
      const url = `/images/thumbs/${id}_top_thumb.jpg`;
      console.log("[ovals] thumbUrl for", id, "=>", url);
      return url;
    }

    function pieceUrl(id) {
      const url = `/gallery/piece.html?id=${encodeURIComponent(id)}`;
      console.log("[ovals] pieceUrl for", id, "=>", url);
      return url;
    }

    function makeCard(piece) {
      console.log("[ovals] making card for:", piece);

      const card = document.createElement("a");
      card.className = "piece-card";
      card.href = pieceUrl(piece.id);

      const thumbShell = document.createElement("div");
      thumbShell.className = "piece-thumb-shell";

      const img = document.createElement("img");
      img.className = "piece-thumb";
      img.src = thumbUrl(piece.id);
      img.alt = piece.title;

      img.onload = () => {
        console.log("[ovals] thumb loaded:", piece.id, img.src);
      };

      img.onerror = () => {
        console.error("[ovals] thumb missing:", piece.id, img.src);
        thumbShell.innerHTML = `<div class="piece-fallback">Thumbnail not found for ${piece.id}.</div>`;
      };

      thumbShell.appendChild(img);

      const title = document.createElement("h2");
      title.className = "piece-name";
      title.textContent = piece.title;

      const meta = document.createElement("p");
      meta.className = "piece-id";
      meta.textContent = piece.id.toUpperCase();

      card.appendChild(thumbShell);
      card.appendChild(title);
      card.appendChild(meta);

      return card;
    }

    function renderGrid() {
      console.log("[ovals] renderGrid called");

      if (!grid) {
        console.error("[ovals] ovalsGrid not found");
        return;
      }

      if (!ovalPieces.length) {
        console.warn("[ovals] no ovalPieces found");
        grid.innerHTML = `<div class="empty-state">No oval pieces are listed yet.</div>`;
        return;
      }

      ovalPieces.forEach((piece) => {
        const card = makeCard(piece);
        grid.appendChild(card);
      });

      console.log("[ovals] rendered cards:", grid.children.length);
      console.log("[ovals] final grid HTML:", grid.innerHTML);
    }

    try {
      renderGrid();
      console.log("[ovals] render complete");
    } catch (error) {
      console.error("[ovals] render failed:", error);
    }
  </script>
</body>
</html>
