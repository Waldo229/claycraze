<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClaycrazE | Find a Pot</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      margin: 0;
      background: #f5f1ea;
      color: #2b2118;
    }

    main {
      max-width: 1180px;
      margin: auto;
      padding: 28px;
    }

    a {
      color: inherit;
    }

    .intro {
      max-width: 720px;
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .filters {
      background: #fffaf2;
      border: 1px solid #ded2c0;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cdbda8;
      border-radius: 10px;
      padding: 11px;
      font: inherit;
      background: white;
      color: #2b2118;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      background: #2b2118;
      color: #fffaf2;
    }

    button.secondary {
      background: #8a7358;
    }

    .result-count {
      margin: 12px 0 18px;
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #fffaf2;
      border: 1px solid #ded2c0;
      border-radius: 18px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #efe4d5;
    }

    .body {
      padding: 14px;
    }

    .meta {
      font-size: 0.9rem;
      opacity: 0.78;
      line-height: 1.4;
      margin-top: 6px;
    }

    @media (max-width: 900px) {
      .row {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .row {
        grid-template-columns: 1fr;
      }

      main {
        padding: 18px;
      }
    }
  </style>
</head>

<body>
  <main>
    <p><a href="https://claycraze-admin-test.onrender.com/gallery/">← Gallery</a></p>

    <h1>Find a Pot</h1>

    <p class="intro">
      Search by practical fit: shape, size, color, surface, and availability.
      This is for the buyer who already has a tree in mind.
    </p>

    <section class="filters">
      <div class="row">
        <div>
          <label for="shape">Shape</label>
          <select id="shape">
            <option value="">Any</option>
            <option value="OV">Oval</option>
            <option value="RD">Round</option>
            <option value="RC">Rectangle</option>
            <option value="CA">Cascade</option>
            <option value="FS">Freestyle</option>
            <option value="IK">Ikebana</option>
            <option value="SC">Sculpture</option>
            <option value="FJ">Face Jug</option>
          </select>
        </div>

        <div>
          <label for="surface">Surface</label>
          <select id="surface">
            <option value="">Any</option>
            <option value="matte">Matte</option>
            <option value="satin">Satin</option>
            <option value="gloss">Gloss</option>
            <option value="textured">Textured</option>
          </select>
        </div>

        <div>
          <label for="color">Color contains</label>
          <input id="color" type="text" placeholder="blue, green, iron">
        </div>

        <div>
          <label for="status">Status</label>
          <select id="status">
            <option value="available">Available</option>
            <option value="">Any</option>
            <option value="sold">Sold</option>
            <option value="archive">Archive</option>
            <option value="private">Private</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="minLength">Min length</label>
          <input id="minLength" type="number" step="0.25" placeholder="5">
        </div>

        <div>
          <label for="maxLength">Max length</label>
          <input id="maxLength" type="number" step="0.25" placeholder="7">
        </div>

        <div>
          <label for="minHeight">Min height</label>
          <input id="minHeight" type="number" step="0.25" placeholder="1.5">
        </div>

        <div>
          <label for="maxHeight">Max height</label>
          <input id="maxHeight" type="number" step="0.25" placeholder="2.5">
        </div>
      </div>

      <div class="buttons">
        <button id="applyBtn" type="button">Find Matches</button>
        <button id="resetBtn" type="button" class="secondary">Reset</button>
      </div>
    </section>

    <div class="result-count" id="count">Loading records…</div>
    <section class="grid" id="results"></section>
  </main>

  <script>
    const RENDER_BASE = "https://claycraze-admin-test.onrender.com";
    let allPieces = [];

    const shapeNames = {
      OV: "Oval",
      RD: "Round",
      RC: "Rectangle",
      CA: "Cascade",
      FS: "Freestyle",
      IK: "Ikebana",
      SC: "Sculpture",
      FJ: "Face Jug"
    };

    function numberOrNull(value) {
      if (value === "") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function matchesFilters(piece) {
      const shape = document.getElementById("shape").value;
      const surface = document.getElementById("surface").value;
      const color = document.getElementById("color").value.trim().toLowerCase();
      const status = document.getElementById("status").value;

      const minLength = numberOrNull(document.getElementById("minLength").value);
      const maxLength = numberOrNull(document.getElementById("maxLength").value);
      const minHeight = numberOrNull(document.getElementById("minHeight").value);
      const maxHeight = numberOrNull(document.getElementById("maxHeight").value);

      if (shape && piece.shape !== shape) return false;
      if (surface && String(piece.surface || "").toLowerCase() !== surface) return false;
      if (status && piece.status !== status) return false;

      if (color) {
        const colors = Array.isArray(piece.colors) ? piece.colors : [];
        const haystack = colors.join(" ").toLowerCase();
        if (!haystack.includes(color)) return false;
      }

      if (minLength !== null && (piece.length == null || piece.length < minLength)) return false;
      if (maxLength !== null && (piece.length == null || piece.length > maxLength)) return false;
      if (minHeight !== null && (piece.height == null || piece.height < minHeight)) return false;
      if (maxHeight !== null && (piece.height == null || piece.height > maxHeight)) return false;

      return true;
    }

    function renderPieces(pieces) {
      const results = document.getElementById("results");
      const count = document.getElementById("count");

      count.textContent = `${pieces.length} match${pieces.length === 1 ? "" : "es"}`;

      if (!pieces.length) {
        results.innerHTML = "";
        return;
      }

      results.innerHTML = pieces.map(p => {
        const thumb = p.images?.top?.thumb || p.images?.bottom?.thumb || "";
        const shape = shapeNames[p.shape] || p.shape || "Piece";

        const dims = p.dimensions || [
          p.length ? `${p.length}" L` : "",
          p.width ? `${p.width}" W` : "",
          p.height ? `${p.height}" H` : ""
        ].filter(Boolean).join(" · ");

        const colorText = Array.isArray(p.colors) && p.colors.length
          ? p.colors.join(", ")
          : "";

        return `
          <a class="card" href="${RENDER_BASE}/piece.html?id=${encodeURIComponent(p.id)}">
            <img src="${escapeHTML(thumb)}" alt="${escapeHTML(p.id)} thumbnail">
            <div class="body">
              <strong>${escapeHTML(p.title || p.id)}</strong><br>
              <small>${escapeHTML(p.id)} · ${escapeHTML(shape)}</small>
              <div class="meta">
                ${dims ? `${escapeHTML(dims)}<br>` : ""}
                ${p.surface ? `${escapeHTML(p.surface)} surface<br>` : ""}
                ${colorText ? `${escapeHTML(colorText)}<br>` : ""}
                ${p.price ? `$${escapeHTML(p.price)}` : ""}
              </div>
            </div>
          </a>
        `;
      }).join("");
    }

    function applyFilters() {
      renderPieces(allPieces.filter(matchesFilters));
    }

    document.getElementById("applyBtn").addEventListener("click", applyFilters);

    document.getElementById("resetBtn").addEventListener("click", () => {
      document.getElementById("shape").value = "";
      document.getElementById("surface").value = "";
      document.getElementById("color").value = "";
      document.getElementById("status").value = "available";
      document.getElementById("minLength").value = "";
      document.getElementById("maxLength").value = "";
      document.getElementById("minHeight").value = "";
      document.getElementById("maxHeight").value = "";
      applyFilters();
    });

    fetch(`${RENDER_BASE}/api/pieces`)
      .then(r => {
        if (!r.ok) {
          throw new Error(`API returned ${r.status}`);
        }
        return r.json();
      })
      .then(data => {
        allPieces = data.pieces || [];
        applyFilters();
      })
      .catch(error => {
        console.error(error);
        document.getElementById("count").textContent =
          "Could not load records from Render.";
      });
  </script>
</body>
</html>
