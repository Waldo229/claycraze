<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaycrazE | Rectangles</title>

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png" />
  <link rel="stylesheet" href="/css/styles.css" />

  <style>
    .rectangles-page {
      min-height: 100vh;
    }

    .rectangles-shell {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .rectangles-hero {
      background: rgba(244, 233, 194, 0.72);
      border: 1px solid rgba(90, 65, 32, 0.14);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(49, 29, 13, 0.08);
      padding: 1.8rem 1.5rem;
      margin-bottom: 1.75rem;
    }

    .rectangles-kicker {
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #775126;
      margin: 0 0 0.4rem;
    }

    .rectangles-title {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.02;
      margin: 0 0 0.65rem;
      color: #2f1d12;
    }

    .rectangles-copy {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #4b3422;
      max-width: 48rem;
      margin: 0;
    }

    .rectangles-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.25rem;
    }

    .rectangles-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.15rem;
      border-radius: 999px;
      background: rgba(87, 57, 28, 0.9);
      color: #f7eed7;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .rectangles-link.secondary {
      background: rgba(255, 250, 240, 0.7);
      color: #5d3b1c;
      border: 1px solid rgba(90, 65, 32, 0.14);
    }

    .rectangles-link:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .rectangles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .piece-card {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      padding: 1rem;
      border-radius: 22px;
      background: rgba(246, 237, 206, 0.86);
      border: 1px solid rgba(90, 65, 32, 0.12);
      box-shadow: 0 14px 32px rgba(49, 29, 13, 0.08);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .piece-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(49, 29, 13, 0.12);
    }

    .piece-thumb-shell {
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: rgba(225, 210, 170, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0.7rem;
    }

    .piece-thumb {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .piece-fallback {
      text-align: center;
      line-height: 1.5;
      color: #6c4a27;
      font-size: 0.96rem;
      padding: 1rem;
    }

    .piece-name {
      margin: 0;
      font-size: 1.08rem;
      color: #2f1d12;
    }

    .piece-id {
      margin: 0;
      font-size: 0.94rem;
      color: #6a4a2a;
      letter-spacing: 0.03em;
    }
  </style>
</head>

<body class="practice-page rectangles-page">
  <header class="site-header">
    <div class="header-shell">
      <a class="site-brand" href="/">
        <span class="site-title">ClaycrazE</span>
        <span class="site-tag">The Pottery and Studio Wisdom of Jim Alexander</span>
      </a>

      <button class="nav-toggle" id="navToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" id="siteNav">
        <a href="/">Home</a>
        <a href="/theory.html">Theory</a>
        <a href="/practice.html" class="active">Practice</a>
      </nav>
    </div>
  </header>

  <main class="rectangles-shell">
    <section class="rectangles-hero">
      <p class="rectangles-kicker">Practice / Bonsai</p>
      <h1 class="rectangles-title">Rectangular Bonsai Containers</h1>
      <p class="rectangles-copy">
        Rectangular forms introduce direction and structure. They hold the tree
        with a quiet firmness, offering stability without stiffness.
      </p>

      <div class="rectangles-actions">
        <a class="rectangles-link" href="/practice.html">Back to Practice</a>
        <a class="rectangles-link secondary" href="/gallery/bonsai.html">Back to Bonsai</a>
      </div>
    </section>

    <section class="rectangles-grid" id="rectanglesGrid"></section>
  </main>

  <script>
    const rectanglePieces = [
      { id: "rc-2604-05", title: "Rectangle bonsai container" }
    ];

    const grid = document.getElementById("rectanglesGrid");

    function thumbUrl(id) {
      return `/images/thumbs/${id}_top_thumb.jpg`;
    }

    function pieceUrl(id) {
      return `/gallery/piece.html?id=${encodeURIComponent(id)}`;
    }

    function makeCard(piece) {
      const card = document.createElement("a");
      card.className = "piece-card";
      card.href = pieceUrl(piece.id);

      const thumbShell = document.createElement("div");
      thumbShell.className = "piece-thumb-shell";

      const img = document.createElement("img");
      img.className = "piece-thumb";
      img.src = thumbUrl(piece.id);
      img.alt = piece.title;

      img.onerror = () => {
        thumbShell.innerHTML = `<div class="piece-fallback">No thumbnail for ${piece.id}</div>`;
      };

      thumbShell.appendChild(img);

      const title = document.createElement("h2");
      title.className = "piece-name";
      title.textContent = piece.title;

      const meta = document.createElement("p");
      meta.className = "piece-id";
      meta.textContent = piece.id.toUpperCase();

      card.appendChild(thumbShell);
      card.appendChild(title);
      card.appendChild(meta);

      return card;
    }

    function renderGrid() {
      rectanglePieces.forEach(piece => {
        grid.appendChild(makeCard(piece));
      });
    }

    renderGrid();
  </script>
</body>
</html>
