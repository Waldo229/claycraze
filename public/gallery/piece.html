<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaycrazE | Piece</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/gallery.css" />
</head>
<body class="piece-page">

  <header class="site-header">
    <div class="header-shell">
      <a class="site-brand" href="/index.html">
        <span class="site-title">ClaycrazE</span>
        <span class="site-tag">Theory &amp; Practice</span>
      </a>

      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="siteNav"
      >
        ☰
      </button>

      <nav class="site-nav" id="siteNav">
        <a href="/index.html">Home</a>
        <a href="/theory.html">Theory</a>
        <a href="/practice.html">Practice</a>
        <a href="/gallery/bonsai/">Bonsai</a>
      </nav>
    </div>
  </header>

  <main class="piece-main">
    <section class="piece-shell">
      <div class="piece-stage" id="pieceStage"></div>
      <div class="piece-details" id="pieceDetails"></div>
    </section>
  </main>

  <script src="/js/piece.js"></script>
  <script>
    const navToggle = document.getElementById("navToggle");
    const siteNav = document.getElementById("siteNav");

    if (navToggle && siteNav) {
      navToggle.addEventListener("click", () => {
        const isOpen = siteNav.classList.toggle("open");
        navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });
    }
  </script>
</body>
</html>
