<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaycrazE | Piece</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1><a href="/" class="site-title-link">ClaycrazE</a></h1>
      <p class="site-subtitle">Practice</p>

      <nav class="top-nav" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/theory.html">Theory</a>
        <a href="/practice.html" class="active">Practice</a>
      </nav>
    </div>
  </header>

  <main class="gallery-page">
    <section class="gallery-intro">
      <h2 id="pieceTitle">Piece</h2>
      <p id="pieceMeta">Detail view</p>
    </section>

    <section class="gallery-grid">
      <article class="gallery-card">
        <div class="gallery-card-link">
          <img id="pieceImage" src="" alt="" style="display:none;" />
          <h3 id="pieceName">Untitled</h3>
          <p id="pieceDescription">No description available.</p>
        </div>
      </article>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    const title = params.get("title") || "Piece";
    const name = params.get("name") || title;
    const description = params.get("description") || "No description available.";
    const image = params.get("image") || "";
    const meta = params.get("meta") || "Detail view";

    document.title = `ClaycrazE | ${title}`;
    document.getElementById("pieceTitle").textContent = title;
    document.getElementById("pieceName").textContent = name;
    document.getElementById("pieceDescription").textContent = description;
    document.getElementById("pieceMeta").textContent = meta;

    const img = document.getElementById("pieceImage");
    if (image) {
      img.src = image;
      img.alt = name;
      img.style.display = "block";
    }
  </script>
</body>
</html>
