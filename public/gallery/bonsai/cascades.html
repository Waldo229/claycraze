<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClaycrazE | Cascades</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 0; background: #f5f1ea; color: #2b2118; }
    main { max-width: 1120px; margin: auto; padding: 28px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 18px; }
    .card { display: block; text-decoration: none; color: inherit; background: #fffaf2; border: 1px solid #ded2c0; border-radius: 18px; overflow: hidden; }
    img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; }
    .body { padding: 14px; }
  </style>
</head>
<body>
  <main>
    <p><a href="/">← Home</a></p>
    <h1>Cascade Bonsai Pots</h1>
    <section class="grid" id="grid">Loading…</section>
  </main>
  <script>
    fetch("/api/pieces?shape=CA").then(r => r.json()).then(data => {
      const grid = document.getElementById("grid");
      const pieces = data.pieces || [];
      if (!pieces.length) { grid.textContent = "No oval records yet."; return; }
      grid.innerHTML = pieces.map(p => `
        <a class="card" href="/piece.html?id=${encodeURIComponent(p.id)}">
          <img src="${p.images?.top?.thumb || p.images?.bottom?.thumb || ""}" alt="${p.id} thumbnail">
          <div class="body">
            <strong>${p.title || p.id}</strong><br>
            <small>${p.id}${p.dimensions ? " · " + p.dimensions : ""}</small>
          </div>
        </a>
      `).join("");
    });
  </script>
</body>
</html>
