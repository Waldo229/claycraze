<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClaycrazE | Face Jugs</title>
  <link rel="stylesheet" href="/css/gallery.css" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="https://claycraze.com/">ClaycrazE</a>

      <nav class="site-nav" aria-label="Primary">
        <a href="https://claycraze.com/">Home</a>
        <a href="https://claycraze.com/theory.html">Theory</a>
        <a href="/gallery/" class="active">Practice</a>
        <a href="/gallery/facejugs.html" aria-current="page">Face Jugs</a>
      </nav>
    </div>
  </header>

  <main class="gallery-page">
    <section class="gallery-intro">
      <p class="eyebrow">Practice</p>
      <h1>Face Jugs</h1>
      <p>
        Expressive, direct, and rooted in tradition. Each piece carries gesture,
        humor, and character shaped in the moment.
      </p>
    </section>

    <section class="gallery-grid" id="grid" aria-live="polite">
      <div class="loading">Loading face jugs...</div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; ClaycrazE</p>
  </footer>

  <script>
    fetch("/api/pieces?shape=FJ")
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById("grid");
        const pieces = data.pieces || [];

        if (!pieces.length) {
          grid.innerHTML = "<div class='loading'>No face jug records yet.</div>";
          return;
        }

        grid.innerHTML = pieces.map(p => `
          <a class="card" href="/piece.html?id=${encodeURIComponent(p.id)}">
            <img src="${p.images?.top?.thumb || p.images?.bottom?.thumb || ""}" alt="${p.id} thumbnail">
            <div class="card-body">
              <strong>${p.title || p.id}</strong><br>
              <small>${p.id}${p.dimensions ? " · " + p.dimensions : ""}</small>
            </div>
          </a>
        `).join("");
      })
      .catch(() => {
        document.getElementById("grid").innerHTML =
          "<div class='loading'>Unable to load face jugs.</div>";
      });
  </script>
</body>
</html>
