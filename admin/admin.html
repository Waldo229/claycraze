<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaycrazE Admin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f4f4;
      color: #222;
    }

    h1 {
      margin-bottom: 20px;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 12px;
      overflow-x: auto;
    }

    .output {
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>ClaycrazE Admin</h1>

  <form id="adminForm">

    <label>Shape</label>
    <select id="shape">
      <option value="OV">OV</option>
      <option value="RC">RC</option>
      <option value="RD">RD</option>
      <option value="CS">CS</option>
      <option value="SL">SL</option>
    </select>

    <label>YearMonth</label>
    <input id="yearMonth" type="text" />

    <label>Generated Piece ID</label>
    <input id="pieceIdPreview" type="text" readonly />

    <label>Title</label>
    <input id="title" type="text" />

    <label>Category</label>
    <input id="category" type="text" />

    <label>Clay</label>
    <input id="clay" type="text" />

    <label>Finish</label>
    <input id="finish" type="text" />

    <label>Dimensions</label>
    <input id="dimensions" type="text" />

    <label>Status</label>
    <select id="status">
      <option value="available">available</option>
      <option value="sold">sold</option>
      <option value="held">held</option>
      <option value="gifted">gifted</option>
      <option value="archive">archive</option>
    </select>

    <label>Has Bottom Image?</label>
    <select id="hasBottomImage">
      <option value="1">Yes</option>
      <option value="0">No</option>
    </select>

    <label>Published?</label>
    <select id="isPublished">
      <option value="1">Yes</option>
      <option value="0">No</option>
    </select>

    <label>Description</label>
    <textarea id="description"></textarea>

    <label>Thumbnail Image</label>
    <input id="thumbImage" type="file" accept="image/jpeg" />

    <label>Full Top Image</label>
    <input id="fullTopImage" type="file" accept="image/jpeg" />

    <label>Full Bottom Image</label>
    <input id="fullBottomImage" type="file" accept="image/jpeg" />

    <button type="button" id="previewBtn">Preview</button>
    <button type="reset" id="resetBtn">Reset</button>
    <button type="submit">Save Piece</button>

  </form>

  <div class="output">
    <h2>Piece ID</h2>
    <pre id="pieceIdOutput">—</pre>

    <h2>Image Output</h2>
    <pre id="imageOutput">—</pre>

    <h2>Record Output</h2>
    <pre id="recordOutput">—</pre>

    <h2>Status</h2>
    <pre id="statusOutput">Ready.</pre>
  </div>

  <script src="/admin/js/admin.js"></script>

</body>
</html>
