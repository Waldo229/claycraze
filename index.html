  :root { --bg:#0b0b0c; --fg:#f4f4f5; --muted:#b3b3b7; --accent:#d4af37; }

  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--fg); }

  header { border-bottom: 1px solid #1f1f22; }
  .brand { font-size: 1.25rem; letter-spacing: .02em; margin: 0; }
  nav a { margin-left: 1rem; opacity:.9 }
  nav a:hover { opacity:1; color: var(--accent); }
  .hero { padding: clamp(3rem, 7vw, 6rem) 0; }
  .hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.1; margin: 0 0 .5rem; }

  .cta { display: inline-block; background: var(--accent); color:#1a1a1a; padding:.75rem 1rem; border-radius:.5rem; font-weight:600; }
  .grid { display:grid; gap:1rem; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); margin-top:2rem; }
