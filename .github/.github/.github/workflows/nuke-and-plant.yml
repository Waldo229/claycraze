name: nuke-and-plant

on:
  workflow_dispatch:        # manual run button
  push:
    branches: [ main ]      # auto-run on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SG_HOST: ${{ secrets.SG_HOST }}
      SG_PORT: ${{ secrets.SG_PORT }}
      SG_USER: ${{ secrets.SG_USER }}
      SG_PASSPHRASE: ${{ secrets.SG_PASSPHRASE }}
      REMOTE_PATH: "/home/customer/www/claycraze.com/public_html" # <-- adjust once confirmed
      PRESERVE_WELL_KNOWN: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write SSH key
        id: key
        shell: bash
        env:
          SG_PRIVATE_KEY: ${{ secrets.SG_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SG_PRIVATE_KEY" > "$HOME/.ssh/sg_key"
          chmod 600 "$HOME/.ssh/sg_key"
          ssh-keyscan -p "$SG_PORT" "$SG_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Sanity-check target & drop predictable marker
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"
          : "${REMOTE_PATH:?REMOTE_PATH is required}"

          echo "Will deploy to REMOTE_PATH: $REMOTE_PATH"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc '
            set -euo pipefail
            echo "whoami: $(whoami)"
            echo "HOME: $HOME"
            echo "--- candidate public_html dirs ---"
            (find /home -maxdepth 5 -type d -name public_html 2>/dev/null; \
             find /home/customer -maxdepth 6 -type d -name public_html 2>/dev/null) | sort || true
            echo "--- ls of REMOTE_PATH ---"
            ls -la "'"$REMOTE_PATH"'" || echo "REMOTE_PATH not found: "'"$REMOTE_PATH"'"

            TS=$(date -u +%Y%m%d-%H%M%SZ)
            echo "NUKE_TEST_$TS" > "'"$REMOTE_PATH"'/NUKE_TEST_LATEST.txt"
            echo "NUKE_TEST_$TS" > "'"$REMOTE_PATH"'/NUKE_TEST_$TS.txt"
            echo "Wrote NUKE_TEST_LATEST.txt + timestamped marker in: "'"$REMOTE_PATH"'"
          '

      - name: NUKE remote directory
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"

          if [[ "$REMOTE_PATH" != *"/public_html" ]]; then
            echo "Refusing: REMOTE_PATH does not end with /public_html ($REMOTE_PATH)"
            exit 2
          fi

          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc "
            set -euo pipefail
            mkdir -p '$REMOTE_PATH'
            cd '$REMOTE_PATH'
            if [ -d .well-known ] && [ '$PRESERVE_WELL_KNOWN' = 'true' ]; then
              find . -mindepth 1 -maxdepth 1 ! -name '.well-known' -exec rm -rf {} +
            else
              find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            fi
            echo 'NUKE complete in: $REMOTE_PATH'
          "

      - name: PLANT (deploy fresh via rsync)
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"

          RSYNC_EXCLUDES=(
            ".git/"
            ".github/"
            "README.md"
            "LICENSE"
            ".gitignore"
          )
          RSYNC_ARGS=()
          for e in "${RSYNC_EXCLUDES[@]}"; do
            RSYNC_ARGS+=(--exclude "$e")
          done

          rsync -az --delete \
            -e "ssh -i $KEY -p $SG_PORT -o StrictHostKeyChecking=no" \
            "${RSYNC_ARGS[@]}" \
            ./ "$SG_USER@$SG_HOST:$REMOTE_PATH/"

          echo "PLANT complete to $REMOTE_PATH"
