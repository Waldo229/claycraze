name: deploy-staging

on:
  push:
    branches: [ staging ]       # deploy when you push to "staging"
  workflow_dispatch:            # or run manually

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SG_HOST: ${{ secrets.SG_HOST }}          # e.g. server123.sg-host.com
      SG_PORT: ${{ secrets.SG_PORT }}          # usually 18765
      SG_USER: ${{ secrets.SG_USER }}          # e.g. u1966-olev38ziybsd
      SG_PASSPHRASE: ${{ secrets.SG_PASSPHRASE }}
      REMOTE_PATH: "/home/${{ secrets.SG_USER }}/domains/staging.claycraze.com/public_html"
      NUKE_BEFORE: "true"                      # set "false" to keep existing files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write SSH key
        env: { SG_PRIVATE_KEY: ${{ secrets.SG_PRIVATE_KEY }} }
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SG_PRIVATE_KEY" > "$HOME/.ssh/sg_key"
          chmod 600 "$HOME/.ssh/sg_key"
          ssh-keyscan -p "$SG_PORT" "$SG_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Sanity check & marker
        run: |
          KEY="$HOME/.ssh/sg_key"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc '
            set -euo pipefail
            echo "WHOAMI: $(whoami)  HOME: $HOME"
            cd "'"$REMOTE_PATH"'" || { echo "Missing $REMOTE_PATH"; exit 1; }
            pwd
            TS=$(date -u +%Y%m%d-%H%M%SZ)
            echo "staging marker $TS" > DEPLOY_MARKER.txt
            echo "Marker written to $REMOTE_PATH"
          '

      - name: NUKE staging (preserve .well-known)
        if: env.NUKE_BEFORE == 'true'
        run: |
          KEY="$HOME/.ssh/sg_key"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc '
            set -euo pipefail
            cd "'"$REMOTE_PATH"'"
            if [ -d .well-known ]; then
              find . -mindepth 1 -maxdepth 1 ! -name ".well-known" -exec rm -rf {} +
            else
              find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            fi
            echo "NUKE complete"
          '

      - name: Deploy via rsync
        run: |
          KEY="$HOME/.ssh/sg_key"
          EXCLUDES=( ".git/" ".github/" "LICENSE" "README.md" ".gitignore" )
          ARGS=(); for e in "${EXCLUDES[@]}"; do ARGS+=(--exclude "$e"); done
          rsync -az --delete \
            -e "ssh -i $KEY -p $SG_PORT -o StrictHostKeyChecking=no" \
            "${ARGS[@]}" \
            ./ "$SG_USER@$SG_HOST:$REMOTE_PATH/"
          echo "Deploy complete → $REMOTE_PATH"

      - name: Post-deploy proof & cleanup marker
        run: |
          KEY="$HOME/.ssh/sg_key"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc '
            set -euo pipefail
            cd "'"$REMOTE_PATH"'"
            echo "TOP OF TREE:"; ls -la | head -n 30
            rm -f DEPLOY_MARKER.txt || true
            echo "Marker cleaned"
          '
