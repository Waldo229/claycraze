name: SG Proof (write marker + list docroot)

on:
  workflow_dispatch:

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Sanity check secrets
        run: |
          test -n "${{ secrets.SG_HOST }}" || (echo "Missing SG_HOST" && exit 1)
          test -n "${{ secrets.SG_PORT }}" || (echo "Missing SG_PORT" && exit 1)
          test -n "${{ secrets.SG_USER }}" || (echo "Missing SG_USER" && exit 1)
          test -n "${{ secrets.SG_PRIVATE_KEY }}" || (echo "Missing SG_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.SG_PASSPHRASE }}" || (echo "Missing SG_PASSPHRASE" && exit 1)

      - name: Write private key to file
        run: |
          umask 077
          echo "${{ secrets.SG_PRIVATE_KEY }}" > id_sg
          head -n 1 id_sg

      - name: Create marker + list ~/public_html
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}      # ssh.claycraze.com
          username: ${{ secrets.SG_USER }}  # u1966-...
          port: ${{ secrets.SG_PORT }}      # 18765
          key_path: id_sg
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            set -e
            echo "Connected as: $(whoami)"
            echo "Home: $(pwd)"
            mkdir -p ~/public_html
            echo "ClayCraze SG marker :: $GITHUB_SHA :: $(date -u)" > ~/public_html/DEPLOY_MARKER.txt
            ls -lah ~/public_html | head -n 120
