name: SG smoke
on: { workflow_dispatch: {} }
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Key check
        run: |
          test -n "${{ secrets.SG_PRIVATE_KEY }}" || (echo "Missing SG_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.SG_PASSPHRASE }}"  || (echo "Missing SG_PASSPHRASE" && exit 1)
      - name: Write key
        run: |
          umask 077
          printf "%s" "${{ secrets.SG_PRIVATE_KEY }}" > id_sg
          head -n 1 id_sg
      - name: Touch marker on SG
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key_path: id_sg
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            set -e
            mkdir -p ~/public_html
            echo "SMOKE $(date -u) $GITHUB_SHA" > ~/public_html/SMOKE.txt
            ls -lah ~/public_html | head -n 50
