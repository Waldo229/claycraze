name: Deploy to SiteGround (SCP, passphrase via key file)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write private key to file
        run: |
          umask 077
          echo "${{ secrets.SG_PRIVATE_KEY }}" > id_sg
          # show key type only (for debug without leaking key)
          head -n 1 id_sg

      - name: Local preview
        run: |
          echo "Repo root:"; ls -lah | head -n 80

      # Upload the entire repo root to ~/public_html (change 'source' if your site is in a subfolder)
      - name: Upload via SCP (passphrase + key_path)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key_path: id_sg
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          source: |
            ./**
            ./.htaccess
          target: "~/public_html/"
          overwrite: true

      - name: Verify on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key_path: id_sg
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "After deploy, listing ~/public_html:"
            ls -lah ~/public_html | head -n 80
            stat ~/public_html/index.html || true


