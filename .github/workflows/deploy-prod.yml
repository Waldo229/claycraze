name: SiteGround SSH Diagnostic

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Try SSH to SiteGround
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "Connected as $(whoami)"
            echo "Home directory:"
            pwd
            echo "Listing home:"
            ls -lah ~
            echo "Listing docroot:"
            ls -lah ~/public_html || echo "No public_html"
