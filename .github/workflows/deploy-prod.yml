name: Probe SSH to SiteGround (PROD)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: prod-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Map secrets into env so we can use them in `if:` conditions
    env:
      SG_HOST: ${{ secrets.SG_HOST }}
      SG_PORT: ${{ secrets.SG_PORT }}         # e.g. 18765 on SiteGround (often not 22)
      SG_USER: ${{ secrets.SG_USER }}
      SG_PASSPHRASE: ${{ secrets.SG_PASSPHRASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Write private key (normalize line endings)
        shell: bash
        run: |
          umask 077
          printf "%s" "${{ secrets.SG_PRIVATE_KEY }}" | tr -d '\r' > id_sg
          head -n 1 id_sg

      - name: Show tool versions
        run: |
          ssh -V || true
          rsync --version || true

      - name: Try SSH "whoami" (no passphrase key)
        if: ${{ env.SG_PASSPHRASE == '' }}
        shell: bash
        run: |
          PORT="${SG_PORT:-22}"
          ssh -i id_sg -p "$PORT" -o StrictHostKeyChecking=no \
            "${SG_USER}@${SG_HOST}" \
            'echo CONNECTED && whoami && pwd && uname -a && ls -la | head -40'

      - name: Start ssh-agent (for passphrase keys)
        if: ${{ env.SG_PASSPHRASE != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SG_PRIVATE_KEY }}
          ssh-passphrase: ${{ secrets.SG_PASSPHRASE }}

      - name: Try SSH "whoami" (agent)
        if: ${{ env.SG_PASSPHRASE != '' }}
        shell: bash
        run: |
          PORT="${SG_PORT:-22}"
          ssh -p "$PORT" -o StrictHostKeyChecking=no \
            "${SG_USER}@${SG_HOST}" \
            'echo CONNECTED && whoami && pwd && uname -a && ls -la | head -40'
