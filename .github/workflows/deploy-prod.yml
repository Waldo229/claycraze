name: Deploy to SiteGround (SCP over SSH, PROD)

on:
  push:
    branches: [ main ]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🚚 Upload site via SCP (supports key + passphrase)
      # If your site is at repo root, see the ALT block below.
      - name: Upload via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          source: |
            claycraze.com/public_html/**
            claycraze.com/public_html/.htaccess
          target: ~/public_html/
          overwrite: true
          strip_components: 2   # drops "claycraze.com/public_html" so files land directly at docroot

      # ✅ Verify it landed
      - name: Verify remote contents
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "==> ~/public_html listing"
            ls -lah ~/public_html | head -n 50
            echo "==> index.html timestamp"
            stat ~/public_html/index.html || true



         