name: Deploy to SiteGround (SFTP, PROD)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If index.html is at repo root, set local_path: './'
      # If it's inside claycraze.com/public_html/, keep that path.
      - name: Upload via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SG_HOST }}        # ssh.claycraze.com
          port: ${{ secrets.SG_PORT }}          # 18765
          username: ${{ secrets.SG_USER }}      # u1966-...
          ssh_private_key: ${{ secrets.SG_PRIVATE_KEY }}   # full key text
          passphrase: ${{ secrets.SG_PASSPHRASE }}         # if you set one
          local_path: 'claycraze.com/public_html/'         # or './' if root
          remote_path: 'public_html/'            # relative path from SSH home
          sftp_only: true
          exclude: |
            .git*
            .github/**
            node_modules/**
            **/*.map

      # Verify it actually landed
      - name: Verify remote contents
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "==> ~/public_html listing"
            ls -lah ~/public_html | head -n 50
            echo "==> index.html?"
            stat ~/public_html/index.html || true

         