name: Probe SSH to SiteGround (PROD)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SG_HOST: ${{ secrets.SG_HOST }}
      SG_PORT: ${{ secrets.SG_PORT }}
      SG_USER: ${{ secrets.SG_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Write key (normalize line endings)
        shell: bash
        run: |
          umask 077
          printf "%s" "${{ secrets.SG_PRIVATE_KEY }}" | tr -d '\r' > id_sg
          head -n 1 id_sg

      - name: Probe SSH
        shell: bash
        run: |
          PORT="${SG_PORT:-22}"
          ssh -i id_sg -p "$PORT" -o StrictHostKeyChecking=no "${SG_USER}@${SG_HOST}" \
            'echo CONNECTED && whoami && pwd && uname -a && ls -la | head -40'
