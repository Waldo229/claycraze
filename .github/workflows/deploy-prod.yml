name: Deploy to SiteGround (SCP, PROD)

on:
  push:
    branches: [ main ]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Show what we’re about to upload (helps catch path issues)
      - name: Local preview
        run: |
          echo "Repo root:"
          ls -lah | head -n 80

      # 🚚 Upload EVERYTHING in repo root to SG docroot
      # (includes dotfiles; grabs .htaccess explicitly)
      - name: Upload site via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SG_HOST }}         # ssh.claycraze.com
          username: ${{ secrets.SG_USER }}     # your SG SSH user
          port: ${{ secrets.SG_PORT }}         # 18765
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          source: |
            ./**
            ./.htaccess
          target: "~/public_html/"
          overwrite: true

      # ✅ Prove files landed in the right place
      - name: Verify on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "After deploy, listing ~/p
