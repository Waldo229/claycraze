name: Deploy to SiteGround (PROD)
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload to SiteGround (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SG_HOST }}       # gvam1276.siteground.biz
          username: ${{ secrets.SG_USER }}     # jim@claycraze.com
          password: ${{ secrets.SG_PASS }}
          protocol: ftps
          port: ${{ secrets.SG_PORT }}         # 21
          server-dir: ${{ secrets.SG_DIR }}    # "/" = /claycraze.com/public_html/
          local-dir: ./
          state-name: ftp-deploy-sync.json     # <— non-hidden state file
          log-level: verbose
          timeout: 120000
          exclude: |
            **/.git*
            **/.github/**
            node_modules/**
            **/*.psd
            **/*.ai
