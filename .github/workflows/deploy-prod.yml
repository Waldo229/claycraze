name: Deploy to SiteGround (SCP, marker smoke)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Show repo tree (top-level)
        run: |
          echo "PWD: $(pwd)"
          ls -lah | sed -n '1,120p'
          echo "---- try common subfolders ----"
          for d in public public_html dist build claycraze claycraze.com; do
            echo "--- $d ---"; ls -lah "$d" 2>/dev/null || true
          done

      - name: Create marker file
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > DEPLOYED.txt
          echo "Deployed from GitHub Actions" >> DEPLOYED.txt

      - name: Upload marker via SCP (proves auth + path)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          source: DEPLOYED.txt
          target: "~/public_html/"
          overwrite: true

      - name: Verify marker on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "Listing ~/public_html:"
            ls -lah ~/public_html | head -n 80
            echo "DEPLOYED.txt contents:"
            cat ~/public_html/DEPLOYED.txt || true

