name: Deploy to SiteGround (SCP, PROD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write private key to file
        run: |
          umask 077
          echo "${{ secrets.SG_PRIVATE_KEY }}" > id_sg
          head -n 1 id_sg  # shows the key type only, no secrets

