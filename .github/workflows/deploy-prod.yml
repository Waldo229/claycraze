name: Deploy to SiteGround (PROD)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload to SiteGround (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          password: ${{ secrets.SG_PASS }}
          protocol: ftps
          port: 21                          # FTPS is port 21 (don't use 18765 here)
          server-dir: /public_html/         # land at the docroot exactly
          local-dir: claycraze.com/public_html/   # <- path INSIDE your repo that holds index.html
          state-name: .ftp-deploy-sync-state.json
          log-level: verbose
          timeout: 120000
         