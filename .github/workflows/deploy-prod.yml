name: Deploy to SiteGround (SFTP, PROD)

on:
  push:
    branches: [ main ]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🚚 Upload site to SiteGround via SFTP (SSH + passphrase supported)
      # NOTE: Your site files are inside claycraze.com/public_html/ (per your screenshots)
      # If your index.html is at repo root instead, see the alternate block below.
      - name: Upload via SFTP
        uses: appleboy/sftp-action@v0.7.1
        with:
            host: ${{ secrets.SG_HOST }}
            username: ${{ secrets.SG_USER }}
            port: ${{ secrets.SG_PORT }}
            key: ${{ secrets.SG_PRIVATE_KEY }}
            passphrase: ${{ secrets.SG_PASSPHRASE }}
            # Upload the CONTENTS of this folder (not the folder itself)
            source: |
              claycraze.com/public_html/**
              claycraze.com/public_html/.htaccess
            target: ~/public_html/
            overwrite: true
            # optional safety: timeout in seconds
            timeout: 600

      # ✅ Verify that files landed in the right place
      - name: Verify remote contents
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "==> Listing ~/public_html"
            ls -lah ~/public_html | head -n 50
            echo "==> index.html timestamp"
            stat ~/public_html/index.html || true


         