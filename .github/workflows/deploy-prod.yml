name: Deploy to SiteGround (PROD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write private key to file
        run: |
          umask 077
          echo "${{ secrets.SG_PRIVATE_KEY }}" > id_sg

      - name: Deploy via rsync over SSH
        run: |
          RSYNC_EXCLUDES="--exclude .git/ --exclude .github/ --exclude README.md --exclude LICENSE --exclude '*.yml' --exclude .htaccess.txt"
          TARGET="${{ secrets.SG_TARGET }}"
          if [ -z "$TARGET" ]; then
            TARGET="/home/customer/www/claycraze.com/public_html"
          fi
          rsync -avz --delete $RSYNC_EXCLUDES -e "ssh -i id_sg -o StrictHostKeyChecking=no" ./ "${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:$TARGET/"
