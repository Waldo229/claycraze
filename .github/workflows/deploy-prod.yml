- name: Upload to SiteGround (FTPS)
  uses: SamKirkland/FTP-Deploy-Action@v4.3.4
  with:
    server: ${{ secrets.SG_HOST }}
    username: ${{ secrets.SG_USER }}
    password: ${{ secrets.SG_PASS }}
    protocol: ftps
    port: ${{ secrets.SG_PORT }}
    server-dir: ${{ secrets.SG_DIR }}
    local-dir: ./
    exclude: |
      **/.git*
      **/.github/**
      node_modules/**
      **/*.psd
      **/*.ai
    dangerous-clean-slate: false
    log-level: verbose
    timeout: 120000
