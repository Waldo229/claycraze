
name: Deploy to SiteGround (SCP, PROD)

on:
  push:
    branches: [ main ]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Local preview
        run: |
          echo "Repo root:"; ls -lah | head -n 50
          echo "claycraze.com/public_html (if present):"; ls -lah claycraze.com/public_html || true

      - name: Upload site via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          source: |
            claycraze.com/public_html/**
            claycraze.com/public_html/.htaccess
          target: "~/public_html/"
          overwrite: true
          strip_components: 2

      - name: Verify on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SG_HOST }}
          username: ${{ secrets.SG_USER }}
          port: ${{ secrets.SG_PORT }}
          key: ${{ secrets.SG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SG_PASSPHRASE }}
          script: |
            echo "After deploy:"; ls -lah ~/public_html | head -n 50
            echo "index.html timestamp:"; stat ~/public_html/index.html || true
