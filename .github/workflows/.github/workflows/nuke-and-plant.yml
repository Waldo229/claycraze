name: nuke-and-plant
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SG_HOST: ${{ secrets.SG_HOST }}
      SG_PORT: ${{ secrets.SG_PORT }}
      SG_USER: ${{ secrets.SG_USER }}
      SG_PASSPHRASE: ${{ secrets.SG_PASSPHRASE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write SSH key
        shell: bash
        env:
          SG_PRIVATE_KEY: ${{ secrets.SG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          echo "$SG_PRIVATE_KEY" > "$HOME/.ssh/sg_key"
          chmod 600 "$HOME/.ssh/sg_key"
          ssh-keyscan -p "$SG_PORT" "$SG_HOST" >> "$HOME/.ssh/known_hosts"

      # 1) Detect the real webroot and export TARGET_PATH
      - name: Detect webroot (TARGET_PATH)
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"

          CANDIDATES=(
            "\$HOME/public_html"
            "/home/customer/www/claycraze.com/public_html"
            "/home/${SG_USER}/domains/claycraze.com/public_html"
            "/home/${SG_USER}/public_html"
          )

          echo "==> Probing candidates:"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc '
            set -euo pipefail
            echo "whoami: $(whoami)"
            echo "HOME: $HOME"
          '

          TARGET=""
          for d in "${CANDIDATES[@]}"; do
            # expand $HOME on remote side
            EXISTS=$(ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" "bash -lc 'test -d $d && echo yes || echo no'")
            if [[ "$EXISTS" == "yes" ]]; then
              WRITABLE=$(ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" "bash -lc 'test -w $d && echo yes || echo no'")
              echo "Candidate: $d  exists=$EXISTS writable=$WRITABLE"
              if [[ "$WRITABLE" == "yes" ]]; then
                TARGET=$(ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" "bash -lc 'readlink -f $d'")
                break
              fi
            else
              echo "Candidate: $d  exists=no"
            fi
          done

          if [[ -z "$TARGET" ]]; then
            echo "No writable public_html found. Aborting."; exit 2
          fi
          if [[ "$TARGET" != *"/public_html" ]]; then
            echo "Refusing: detected path does not end with /public_html → $TARGET"; exit 2
          fi

          echo "Detected TARGET_PATH: $TARGET"
          echo "TARGET_PATH=$TARGET" >> "$GITHUB_OUTPUT"

      # 2) Sanity check + predictable marker
      - name: Sanity-check & drop markers
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"
          TARGET="${{ steps.detect.outputs.TARGET_PATH }}"
          echo "Will deploy to TARGET_PATH: $TARGET"

          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc "
            set -euo pipefail
            ls -la '$TARGET' | head -n 50 || true
            TS=\$(date -u +%Y%m%d-%H%M%SZ)
            echo 'NUKE_TEST_'\"\$TS\" > '$TARGET/NUKE_TEST_LATEST.txt'
            echo 'NUKE_TEST_'\"\$TS\" > '$TARGET/NUKE_TEST_'\$TS'.txt'
            echo 'Wrote NUKE_TEST_LATEST.txt into: $TARGET'
          "

      # 3) NUKE
      - name: NUKE remote directory (preserve .well-known)
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"
          TARGET="${{ steps.detect.outputs.TARGET_PATH }}"

          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc "
            set -euo pipefail
            cd '$TARGET'
            if [ -d .well-known ]; then
              find . -mindepth 1 -maxdepth 1 ! -name '.well-known' -exec rm -rf {} +
            else
              find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            fi
            echo 'NUKE complete in: $TARGET'
          "

      # 4) PLANT (rsync upload)
      - name: PLANT (deploy fresh via rsync)
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"
          TARGET="${{ steps.detect.outputs.TARGET_PATH }}"

          RSYNC_EXCLUDES=(
            ".git/"
            ".github/"
            "README.md"
            "LICENSE"
            ".gitignore"
          )
          ARGS=()
          for e in "${RSYNC_EXCLUDES[@]}"; do ARGS+=(--exclude "$e"); done

          rsync -az --delete \
            -e "ssh -i $KEY -p $SG_PORT -o StrictHostKeyChecking=no" \
            "${ARGS[@]}" \
            ./ "$SG_USER@$SG_HOST:$TARGET/"

          echo "PLANT complete to $TARGET"

      # 5) List result (proof)
      - name: List deployed files
        shell: bash
        run: |
          set -euo pipefail
          KEY="$HOME/.ssh/sg_key"
          TARGET="${{ steps.detect.outputs.TARGET_PATH }}"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" "bash -lc 'echo Deployed tree at: $TARGET; ls -la $TARGET | head -n 100'"
