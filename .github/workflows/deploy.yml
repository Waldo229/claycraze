name: Deploy Gallery Artifacts to SiteGround (PROD)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SG_CI_KEY }}" > ~/.ssh/sg_ci
          sed -i 's/\r$//' ~/.ssh/sg_ci
          chmod 600 ~/.ssh/sg_ci

      - name: Deploy approved gallery artifacts only
        shell: bash
        env:
          SG_HOST: ${{ secrets.SG_HOST }}
          SG_PORT: ${{ secrets.SG_PORT }}
          SG_USER: ${{ secrets.SG_USER }}
        run: |
          set -euo pipefail

          echo "Preparing SiteGround artifact folders..."

          ssh -p "$SG_PORT" -i ~/.ssh/sg_ci -o StrictHostKeyChecking=no "$SG_USER@$SG_HOST" \
            "mkdir -p \$HOME/public_html/images/full \$HOME/public_html/images/thumbs \$HOME/public_html/data"

          echo "Syncing full-size approved images..."

          rsync -avz --delete \
            -e "ssh -p $SG_PORT -i ~/.ssh/sg_ci -o StrictHostKeyChecking=no" \
            public/images/full/ \
            "$SG_USER@$SG_HOST:\$HOME/public_html/images/full/"

          echo "Syncing approved thumbnails..."

          rsync -avz --delete \
            -e "ssh -p $SG_PORT -i ~/.ssh/sg_ci -o StrictHostKeyChecking=no" \
            public/images/thumbs/ \
            "$SG_USER@$SG_HOST:\$HOME/public_html/images/thumbs/"

          echo "Syncing approved gallery metadata..."

          rsync -avz \
            -e "ssh -p $SG_PORT -i ~/.ssh/sg_ci -o StrictHostKeyChecking=no" \
            public/data/pieces.json \
            "$SG_USER@$SG_HOST:\$HOME/public_html/data/pieces.json"

          echo "Artifact-only deploy complete. SG public site was not wiped."