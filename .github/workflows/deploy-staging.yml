name: Deploy • STAGING (staging → staging.claycraze.com)

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  SG_HOST: ${{ secrets.SG_HOST }}            # e.g. ssh.claycraze.com
  SG_PORT: ${{ secrets.SG_PORT }}            # e.g. 18765
  SG_USER: ${{ secrets.SG_USER_STAGING }}    # e.g. u1966-olev38ziybsd (use exact SG username)
  DEST_PATH: public_html/staging             # ← set to your subdomain’s docroot

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1) Start a native ssh-agent and persist its env across steps
      - name: Start ssh-agent
        shell: bash
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # 2) Add the PASS-PHRASE-PROTECTED key using SSH_ASKPASS (non-interactive)
      - name: Add SiteGround key (ASKPASS, no prompt)
        shell: bash
        env:
          PASSPHRASE: ${{ secrets.SG_PASSPHRASE_STAGING }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SG_PRIVATE_KEY_STAGING }}" > ~/.ssh/id_rsa_staging
          chmod 600 ~/.ssh/id_rsa_staging

          # Minimal askpass helper that outputs the passphrase
          cat > /tmp/askpass.sh << 'EOF'
          #!/usr/bin/env bash
          echo "$PASSPHRASE"
          EOF
          chmod +x /tmp/askpass.sh

          # Use ASKPASS; DISPLAY must be non-empty for ssh-add to use it
          export SSH_ASKPASS=/tmp/askpass.sh
          export DISPLAY=:0
          ssh-add ~/.ssh/id_rsa_staging < /dev/null

          # Optional: confirm key is in the agent
          ssh-add -l

      # 3) Trust host key
      - name: Add SiteGround host to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SG_PORT" "$SG_HOST" >> ~/.ssh/known_hosts

      # 4) (Optional) quick connection smoke test
      - name: Test SSH connection
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=yes -p "$SG_PORT" "$SG_USER@$SG_HOST" "echo 'ssh-ok: $(hostname)'"

      # 5) Deploy via rsync
      - name: Rsync site to STAGING
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "README.md" \
            ./ "$SG_USER@$SG_HOST:$DEST_PATH" -e "ssh -p $SG_PORT"

      # 6) Verify
      - name: Verify deploy (list top of target dir)
        shell: bash
        run: |
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "cd '$DEST_PATH' && pwd && ls -la | head -n 30"
