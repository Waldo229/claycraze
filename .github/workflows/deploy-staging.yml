name: Deploy - STAGING (staging -> staging.claycraze.com)

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  SG_HOST: ${{ secrets.SG_HOST }}              # e.g. ssh.claycraze.com
  SG_PORT: ${{ secrets.SG_PORT }}              # e.g. 18765
  SG_USER: ${{ secrets.SG_USER_STAGING }}      # exact SG SSH user (often u1966-…)
  # ↓ Replace with the EXACT Document Root shown in SiteGround → Domain → Subdomains
  DEST_PATH: /home/customer/www/staging.claycraze.com/public_html

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start ssh-agent
        shell: bash
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Add SG key (ASKPASS, non-interactive) + print fingerprints
        shell: bash
        env:
          PASSPHRASE: ${{ secrets.SG_PASSPHRASE_STAGING }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SG_PRIVATE_KEY_STAGING }}" > ~/.ssh/id_rsa_staging
          # Normalize CRLF just in case the secret was pasted on Windows
          sed -i 's/\r$//' ~/.ssh/id_rsa_staging
          chmod 600 ~/.ssh/id_rsa_staging

          # Minimal askpass helper to feed the passphrase
          printf '#!/usr/bin/env bash\necho "$PASSPHRASE"\n' > /tmp/askpass.sh
          chmod +x /tmp/askpass.sh
          export SSH_ASKPASS=/tmp/askpass.sh
          export SSH_ASKPASS_REQUIRE=force
          export DISPLAY=:0

          # Add the key without a TTY; then show what's loaded + file fingerprint
          setsid -w ssh-add ~/.ssh/id_rsa_staging < /dev/null
          echo "Agent identities:"
          ssh-add -l || true
          echo "Key file fingerprint:"
          ssh-keygen -lf ~/.ssh/id_rsa_staging || true

      - name: Trust host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SG_PORT" "$SG_HOST" >> ~/.ssh/known_hosts

      - name: Smoke test SSH
        shell: bash
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes -p "$SG_PORT" "$SG_USER@$SG_HOST" "echo ssh-ok: \$(whoami)@\$(hostname)"

      - name: Preflight - inspect remote layout (find the right docroot)
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "echo HOME=\$HOME; ls -la; ls -la ~/public_html || true"
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "ls -la /home/customer/www || true"
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "ls -la /home/customer/www/claycraze.com/public_html || true"
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "ls -la /home/customer/www/staging.claycraze.com/public_html || true"
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "echo DEST_PATH=$DEST_PATH; ls -la '$DEST_PATH' || echo 'DEST_PATH missing'"

      - name: Deploy via rsync (only if docroot exists)
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "test -d '$DEST_PATH'"
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "README.md" \
            ./ "$SG_USER@$SG_HOST:$DEST_PATH" -e "ssh -p $SG_PORT"

      - name: Verify deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" "cd '$DEST_PATH' && pwd && ls -la | head -n 30"

      - name: Write deploy stamp
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SG_PORT" "$SG_USER@$SG_HOST" \
            "echo 'staging deploy: $GITHUB_SHA on \$(date -u) UTC' > '$DEST_PATH/.deploy-stamp.txt'"

      - name: Job summary
        shell: bash
        run: |
          echo "### Staging deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`$GITHUB_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- Stamp: https://staging.claycraze.com/.deploy-stamp.txt" >> $GITHUB_STEP_SUMMARY
          echo "- Site:  https://staging.claycraze.com/" >> $GITHUB_STEP_SUMMARY
