name: Deploy - STAGING (staging -> staging.claycraze.com)

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  SG_HOST: ${{ secrets.SG_HOST }}             # e.g. ssh.claycraze.com
  SG_PORT: ${{ secrets.SG_PORT }}             # e.g. 18765
  SG_USER: ${{ secrets.SG_USER_STAGING }}     # exact SG SSH user (often u1966-...)
  DEST_PATH: /home/customer/www/staging.claycraze.com/public_html  # adjust after Preflight output

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start native ssh-agent (persist env)
        shell: bash
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Add passphrase-protected key via SSH_ASKPASS (force)
        shell: bash
        env:
          PASSPHRASE: ${{ secrets.SG_PASSPHRASE_STAGING }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SG_PRIVATE_KEY_STAGING }}" > ~/.ssh/id_rsa_staging
          # Normalize CRLF just in case
          sed -i 's/\r$//' ~/.ssh/id_rsa_staging
          chmod 600 ~/.ssh/id_rsa_staging

          # Minimal askpass helper
          printf
