name: deploy-staging

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SG_HOST: ${{ secrets.SG_HOST }}
      SG_PORT: ${{ secrets.SG_PORT }}
      SG_USER: ${{ secrets.SG_USER }}
      REMOTE_PATH: "/home/${{ secrets.SG_USER }}/domains/staging.claycraze.com/public_html"
      NUKE_BEFORE: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write SSH key
        env:
          SG_PRIVATE_KEY: ${{ secrets.SG_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SG_PRIVATE_KEY" > "$HOME/.ssh/sg_key"
          chmod 600 "$HOME/.ssh/sg_key"
          ssh-keyscan -p "$SG_PORT" "$SG_HOST" >> "$HOME/.ssh/known_hosts"

      - name: NUKE (preserve .well-known)
        run: |
          KEY="$HOME/.ssh/sg_key"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc '
            cd "'"$REMOTE_PATH"'"
            if [ -d .well-known ]; then
              find . -mindepth 1 -maxdepth 1 ! -name ".well-known" -exec rm -rf {} +
            else
              find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            fi
          '

      - name: Deploy via rsync
        run: |
          KEY="$HOME/.ssh/sg_key"
          rsync -az --delete \
            -e "ssh -i $KEY -p $SG_PORT -o StrictHostKeyChecking=no" \
            --exclude ".git/" --exclude ".github/" \
            ./ "$SG_USER@$SG_HOST:$REMOTE_PATH/"

      - name: Post-deploy proof
        run: |
          KEY="$HOME/.ssh/sg_key"
          ssh -i "$KEY" -p "$SG_PORT" "$SG_USER@$SG_HOST" bash -lc '
            cd "'"$REMOTE_PATH"'"
            echo "TREE AFTER DEPLOY:"; ls -la | head -n 30
          '
